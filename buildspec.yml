version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Instalando dependencias..."
      - pip install -r requirements.txt
  build:
    commands:
      - echo "Ejecutando tests con pytest..."
      - pytest tests/ --maxfail=1 --disable-warnings -q
artifacts:
  files:
    - '**/*'
